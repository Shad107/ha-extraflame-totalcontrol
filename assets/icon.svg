<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="55%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#ffd56b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <!-- pellet hopper -->
  <rect x="98" y="20" width="60" height="14" rx="4" fill="#1a1a1a"/>
  <!-- top lid -->
  <rect x="44" y="32" width="168" height="20" rx="8" fill="#262626"/>
  <!-- body -->
  <rect x="34" y="50" width="188" height="170" rx="20" fill="url(#body)" stroke="#ff7a18" stroke-width="6"/>
  <!-- window frame -->
  <rect x="60" y="78" width="136" height="106" rx="10" fill="#0d0d0d" stroke="#ff7a18" stroke-width="3"/>
  <!-- window background -->
  <rect x="68" y="86" width="120" height="90" rx="5" fill="#3a1a08"/>
  <!-- big central flame -->
  <path d="M118,170 C108,140 122,124 128,98 C134,124 148,140 138,170 Z" fill="url(#flame)"/>
  <!-- inner brighter flame -->
  <path d="M122,168 C118,150 126,140 128,124 C130,140 138,150 134,168 Z" fill="#ffe6b3"/>
  <!-- side flames -->
  <path d="M88,170 C82,158 90,148 98,138 C100,150 106,160 102,170 Z" fill="url(#flame)" opacity="0.85"/>
  <path d="M154,170 C158,160 164,150 168,138 C172,148 174,158 168,170 Z" fill="url(#flame)" opacity="0.85"/>
  <!-- ash bed -->
  <ellipse cx="128" cy="174" rx="56" ry="5" fill="#222"/>
  <!-- legs -->
  <rect x="50" y="220" width="22" height="22" fill="#0a0a0a"/>
  <rect x="184" y="220" width="22" height="22" fill="#0a0a0a"/>
</svg>
