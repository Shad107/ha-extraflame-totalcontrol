<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" style="max-width:280px;display:block;margin:0 auto;">
  <!-- top vent / lid -->
  <rect x="30" y="20" width="140" height="14" rx="6" fill="#262626"/>
  <!-- pellet hopper -->
  <rect x="55" y="6" width="90" height="16" rx="4" fill="#1a1a1a"/>
  <!-- body -->
  <rect x="20" y="35" width="160" height="220" rx="14" fill="#1a1a1a" stroke="#ff7a18" stroke-width="2"/>
  <!-- name -->
  <text x="100" y="50" text-anchor="middle" fill="#e8e8e8" font-family="system-ui,sans-serif" font-size="9">Mon poële</text>
  <!-- window frame -->
  <rect x="36" y="65" width="128" height="120" rx="8" fill="#0d0d0d" stroke="#ff7a18" stroke-width="1.5"/>
  <!-- window background -->
  <rect x="42" y="71" width="116" height="108" rx="4" fill="#3a1a08"/>
  <!-- flames -->
  <g opacity="0.95"><defs><linearGradient id="fl0" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffb347"/><stop offset="50%" stop-color="#ff5500"/><stop offset="100%" stop-color="#ffd56b"/></linearGradient><linearGradient id="fl1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffb347"/><stop offset="50%" stop-color="#ff5500"/><stop offset="100%" stop-color="#ffd56b"/></linearGradient><linearGradient id="fl2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffb347"/><stop offset="50%" stop-color="#ff5500"/><stop offset="100%" stop-color="#ffd56b"/></linearGradient><linearGradient id="fl3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffb347"/><stop offset="50%" stop-color="#ff5500"/><stop offset="100%" stop-color="#ffd56b"/></linearGradient><linearGradient id="fl4" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffb347"/><stop offset="50%" stop-color="#ff5500"/><stop offset="100%" stop-color="#ffd56b"/></linearGradient></defs><path d="M68,170 C66,135.6 74,118.4 80,84 C86,118.4 94,135.6 92,170 Z" fill="url(#fl0)" /><path d="M88,170 C86,137.2 94,120.80000000000001 100,88 C106,120.80000000000001 114,137.2 112,170 Z" fill="url(#fl1)" /></g>
  <!-- ash bed -->
  <ellipse cx="100" cy="180" rx="50" ry="6" fill="#2a2a2a"/>
  <!-- status pill -->
  <rect x="60" y="195" width="80" height="16" rx="8" fill="#ff7a18" opacity="0.25"/>
  <text x="100" y="206" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#ff7a18">ON</text>
  <!-- temps -->
  <text x="40" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">Room</text>
  <text x="160" y="232" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">19.5°C</text>
  <text x="40" y="246" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">Target</text>
  <text x="160" y="246" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#e8e8e8">21.0°C</text>
  <!-- legs -->
  <rect x="38" y="255" width="22" height="22" fill="#0f0f0f"/>
  <rect x="140" y="255" width="22" height="22" fill="#0f0f0f"/>
  <!-- power level dots P1..P5 -->
  <g transform="translate(50, 290)">
    <circle cx="0" cy="0" r="7" fill="#ff7a18"/><text x="0" y="3.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#000">1</text><circle cx="25" cy="0" r="7" fill="#ff7a18"/><text x="25" y="3.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#000">2</text><circle cx="50" cy="0" r="7" fill="#333"/><text x="50" y="3.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#000">3</text><circle cx="75" cy="0" r="7" fill="#333"/><text x="75" y="3.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#000">4</text><circle cx="100" cy="0" r="7" fill="#333"/><text x="100" y="3.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#000">5</text>
  </g>
</svg>