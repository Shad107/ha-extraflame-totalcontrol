# Extraflame TotalControl 2.0 — dashboard card template
#
# Paste into a Manual card. The visual stove drawing comes from the
# `sensor.<stove>_visual` entity, which holds the inline SVG in its
# `svg` attribute. Color and flames reflect machineState / power /
# online.
#
# Replace the entity IDs below with whatever HA assigned (typically
# slugified from the stove name in TotalControl — "Mon poêle" →
# "sensor.mon_poele_visual" etc.).
#
# === Option: hide the card when the stove is electrically off ===
# If the Wi-Fi module is unplugged (= stove unplugged), the cloud
# reports it as offline and `binary_sensor.<stove>_online` is OFF.
# Wrap this whole vertical-stack in a conditional to hide the card in
# that case:
#
#   type: conditional
#   conditions:
#     - entity: binary_sensor.mon_poele_online
#       state: "on"
#   card:
#     type: vertical-stack
#     cards: [ ...the rest of this file... ]
#
# Or use `compact` variant below (kept as a copy-paste block at the
# bottom of this file).

type: vertical-stack
cards:
  - type: heading
    heading: Poêle à granulés
    icon: mdi:stove

  # The visual is rendered by the bundled custom card
  # `extraflame-stove-card`, automatically registered as a Lovelace
  # resource by the integration. No HACS-side card install needed.
  - type: custom:extraflame-stove-card
    entity: sensor.mon_poele_visual
    tap_action_entity: climate.mon_poele

  - type: conditional
    conditions:
      - entity: binary_sensor.mon_poele_online
        state: "off"
    card:
      type: markdown
      content: |
        🔌 **Poêle hors tension** — module Wi-Fi injoignable. Les contrôles
        ci-dessous sont désactivés tant que le poêle n'est pas rebranché.

  # Big visual thermostat for direct setpoint control. Drag the
  # outer ring to change the target room temperature.
  - type: thermostat
    entity: climate.mon_poele
    show_current_as_primary: false

  # Compact tile with inline features: temperature slider,
  # hvac mode (heat/off) and the user-edited presets.
  - type: tile
    entity: climate.mon_poele
    name: Climat
    color: orange
    tap_action:
      action: more-info
    features:
      - type: target-temperature
      - type: climate-hvac-modes
        hvac_modes: ["heat", "off"]
      - type: climate-preset-modes
        preset_modes: ["eco", "silence", "confort", "boost"]
        style: icons

  - type: horizontal-stack
    cards:
      - type: tile
        entity: select.mon_poele_power
        name: Puissance
        icon: mdi:fire
      - type: tile
        entity: sensor.mon_poele_room_temperature
        name: Ambiance
        color: amber
      - type: tile
        entity: sensor.mon_poele_smoke_temperature
        name: Fumée
        color: red

  - type: entities
    title: Telemetry
    show_header_toggle: false
    entities:
      - entity: binary_sensor.mon_poele_online
        name: Connecté
      - entity: sensor.mon_poele_current_power
        name: Puissance courante
      - entity: sensor.mon_poele_target_room_temperature
        name: Température cible
      - entity: sensor.mon_poele_main_fan_speed
        name: Vitesse ventilation
      - entity: sensor.mon_poele_machine_state
        name: État machine (brut)
      - entity: binary_sensor.mon_poele_alarm
        name: Alarme

  - type: conditional
    conditions:
      - entity: binary_sensor.mon_poele_smoke_temperature_warning
        state: "on"
    card:
      type: markdown
      content: |
        ⚠️ **Température fumée élevée** — au-delà de 400 °C les tuyaux peuvent
        devenir rouges (risque incendie). Vérifie le tirage et l'apport d'air.

  - type: conditional
    conditions:
      - entity: binary_sensor.mon_poele_alarm
        state: "on"
    card:
      type: markdown
      content: |
        🚨 **Alarme poêle active**
        Code : {{ state_attr('binary_sensor.mon_poele_alarm', 'alarm_code') }}

  - type: horizontal-stack
    cards:
      - type: button
        name: P1
        icon: mdi:numeric-1-circle
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.mon_poele_power
          data:
            option: P1
      - type: button
        name: P3
        icon: mdi:numeric-3-circle
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.mon_poele_power
          data:
            option: P3
      - type: button
        name: P5
        icon: mdi:numeric-5-circle
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.mon_poele_power
          data:
            option: P5
      # Last slot toggles between "Allumer" and "Éteindre" depending on
      # the climate entity's current state. Both conditional cards are
      # mutually exclusive so only one button shows at a time.
      - type: conditional
        conditions:
          - entity: climate.mon_poele
            state: "off"
        card:
          type: button
          name: Allumer
          icon: mdi:fire
          tap_action:
            action: call-service
            service: climate.turn_on
            target:
              entity_id: climate.mon_poele
      - type: conditional
        conditions:
          - entity: climate.mon_poele
            state_not: "off"
        card:
          type: button
          name: Éteindre
          icon: mdi:power
          tap_action:
            action: call-service
            service: climate.turn_off
            target:
              entity_id: climate.mon_poele

# =============================================================
# Variante compacte : carte masquée si le poêle est débranché.
# Copie-colle CE bloc à la place de tout ce qui précède dans un
# Manual card, et tu auras une carte qui disparaît entièrement de
# la dashboard quand `binary_sensor.mon_poele_online` est OFF.
