services:
  extraflame-proxy:
    image: ghcr.io/shad107/ha-extraflame-totalcontrol:latest
    container_name: extraflame-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - EXTRAFLAME_USERNAME=${EXTRAFLAME_USERNAME}
      - EXTRAFLAME_PASSWORD=${EXTRAFLAME_PASSWORD}
      - EXTRAFLAME_POLL_SEC=${EXTRAFLAME_POLL_SEC:-30}
